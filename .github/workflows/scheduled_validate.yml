name: Scheduled Validation

on:
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 06:00 UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  validate:
    name: Advance & validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: output/state.db
          key: simulation-db-${{ github.run_id }}
          restore-keys: simulation-db-

      - name: Init if no database found
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: python -m tdgen_temporal.cli init --date 2024-01-01

      - name: Advance 7 days
        run: python -m tdgen_temporal.cli advance --days 7

      - name: Run full validation
        run: python -m tdgen_temporal.cli validate --verbose --output validation_report.html

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_number }}
          path: validation_report.html
          retention-days: 30

      - name: Save database to cache
        uses: actions/cache/save@v4
        with:
          path: output/state.db
          key: simulation-db-${{ github.run_id }}
