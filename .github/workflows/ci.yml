name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check lint rules
        run: ruff check .

  # ── 2. Type check ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt mypy

      - name: Run mypy
        run: mypy tdgen_temporal --ignore-missing-imports

  # ── 3. Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: pytest tests/ --cov=tdgen_temporal --cov-report=xml -v

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── 4. Smoke test (end-to-end) ────────────────────────────────────────────────
  smoke:
    name: Smoke test (init → advance → validate)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialise simulation
        run: python -m tdgen_temporal.cli init --date 2024-01-01

      - name: Advance 7 days
        run: python -m tdgen_temporal.cli advance --days 7

      - name: Show status
        run: python -m tdgen_temporal.cli status

      - name: Validate data integrity
        run: python -m tdgen_temporal.cli validate --errors-only

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-db
          path: output/state.db
          retention-days: 3
