name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full smoke test
        run: |
          python -m tdgen_temporal.cli init --date 2024-01-01
          python -m tdgen_temporal.cli advance --days 30
          python -m tdgen_temporal.cli validate

      - name: Build Docker image
        run: docker build -t tdgen-temporal:${{ github.ref_name }} .

      - name: Create release notes
        id: notes
        run: |
          echo "## TDGen-Temporal ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### Changes" >> release_notes.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline --no-decorate >> release_notes.md || echo "Initial release" >> release_notes.md

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
